services:
  wireguard-client:
    image: linuxserver/wireguard:latest
    container_name: wireguard-client
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    network_mode: bridge
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - PERSISTENTKEEPALIVE=25
    volumes:
      - '/host/path/appdata/wg-client/config/wg_confs/wg0.conf:/config/wg_confs/wg0.conf'
      - '/host/path/appdata/wg-client/wireguard-healthcheck.sh:/config/wg_confs/wireguard-healthcheck.sh'
      - '/host/path/appdata/wg-client/wireguard-healthcheck.log:/config/wg_confs/wireguard-healthcheck.log'
      - '/lib/modules:/lib/modules'
    labels:
      autoheal: "true"
      autoheal.stop.timeout: "30"
    healthcheck:
      test: ["CMD-SHELL", "/config/wg_confs/wireguard-healthcheck.sh"]
      interval: 30s
      retries: 5
      start_period: 15s
      timeout: 20s    
    restart: always
